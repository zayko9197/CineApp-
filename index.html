<style>
:root{
  --bg:#06060a;
  --card:#0f1115;
  --accent:#e50914;
  --white:#e6e6e6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:Inter,Roboto,sans-serif;}
header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.02);}
header h1{font-size:18px;}
.container{padding:20px 24px 80px;}
.section{margin:20px 0;}
.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.title{font-weight:700;font-size:16px;}

/* ===== CARRUSEL SUAVE ===== */
.carousel{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:12px 6px;
  scroll-behavior: smooth;           /* DESPLAZAMIENTO SUAVE */
  -webkit-overflow-scrolling:touch; /* iOS smooth */
  cursor:grab;
}
.carousel::-webkit-scrollbar{display:none;}

.card{
  min-width:170px;
  flex:0 0 auto;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s;
  height:240px;
  background-color:transparent;
  padding:0;
}
.card:hover{transform:translateY(-6px);}
.thumb{
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
}

/* ===== MODAL ===== */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:50;}
.modal{background:var(--card);max-width:900px;width:100%;border-radius:10px;padding:16px;position:relative;}
.close{position:absolute;top:10px;right:12px;background:transparent;border:0;color:white;font-size:20px;cursor:pointer;}
.modal-grid{display:grid;grid-template-columns:280px 1fr;gap:12px;}
.modal-thumb{width:100%;height:160px;border-radius:6px;background-size:cover;background-position:center;}
.seasons{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.season-btn{padding:12px;border-radius:10px;border:1px solid var(--accent);background:var(--card);color:white;font-weight:600;cursor:pointer;transition:.2s;}
.season-btn:hover{background:var(--accent);transform:scale(1.05);}
.season-btn.active{background:var(--accent);color:white;border-color:var(--accent);}

/* ===== CAPÍTULOS CON SCROLL SI SOBRAN ===== */
.episodes {
  display: flex;
  flex-direction: column;  /* vertical */
  gap: 8px;
  max-height: 300px;       /* altura máxima del área de capítulos */
  overflow-y: auto;        /* scroll vertical si hay muchos capítulos */
  padding-right: 6px;      /* espacio para scroll */
}
.episodes::-webkit-scrollbar {
  width: 6px;
}
.episodes::-webkit-scrollbar-thumb {
  background-color: var(--accent);
  border-radius: 3px;
}
.episode{ 
  flex:0 0 auto;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.03);
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.04));
  cursor:pointer;
  transition:.2s;
}
.episode:hover{transform:scale(1.03);}
.play-link{background:var(--accent);color:white;padding:6px 10px;border-radius:6px;border:0;cursor:pointer;font-size:13px;}

@media(max-width:760px){.modal-grid{grid-template-columns:1fr;}}
</style>

// =======================
// CREAR CARRUSELES Y TARJETAS
// =======================
const CATEGORIES=['Populares','Drama','Comedia','Anime/Fantasía'];
const app=document.getElementById('app');

CATEGORIES.forEach(cat=>{
  const section=document.createElement('section');
  section.className='section';
  section.innerHTML=`
    <div class="section-title"><div class="title">${cat}</div></div>
    <div class="carousel" id="carousel-${cat}"></div>
  `;
  app.appendChild(section);

  const carousel=section.querySelector('.carousel');
  SERIES.filter(s=>s.categoria===cat).forEach(serie=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="thumb" style="background-image:url('${serie.imagen}')"></div>`;
    card.addEventListener('click',()=>openModal(serie));
    carousel.appendChild(card);
  });
});

// =======================
// MODAL TEMPORADAS Y CAPÍTULOS
// =======================
const modalBack=document.getElementById('modalBack'),
      modalTitle=document.getElementById('modalTitle'),
      modalThumb=document.getElementById('modalThumb'),
      modalSeasons=document.getElementById('modalSeasons'),
      modalEpisodes=document.getElementById('modalEpisodes'),
      modalInfo=document.getElementById('modalInfo'),
      modalClose=document.getElementById('modalClose');

function openModal(serie){
  modalTitle.textContent=serie.titulo;
  modalThumb.style.backgroundImage=`url('${serie.imagen}')`;
  modalInfo.textContent=`${serie.temporadas.length} temporadas • Haz clic en una temporada`;
  modalSeasons.innerHTML=''; modalEpisodes.innerHTML='';

  serie.temporadas.forEach((t,idx)=>{
    const btn=document.createElement('button');
    btn.className='season-btn'; btn.textContent='Temporada '+t.numero;
    btn.addEventListener('click', ()=>{
      Array.from(modalSeasons.children).forEach(ch=>ch.classList.remove('active'));
      btn.classList.add('active');
      showEpisodes(t);
    });
    modalSeasons.appendChild(btn);
    if(idx===0){btn.classList.add('active'); showEpisodes(t);}
  });

  modalBack.style.display='flex';
  modalBack.setAttribute('aria-hidden','false');
  modalClose.focus();
}

function showEpisodes(temporada){
  modalEpisodes.innerHTML='';
  temporada.capitulos.forEach(cap=>{
    const div=document.createElement('div'); div.className='episode';
    div.innerHTML=`<div>${cap.titulo}</div><div><button class="play-link">▶ Ver</button></div>`;
    div.querySelector('.play-link').addEventListener('click', e=>{
      e.stopPropagation();
      window.open(cap.link,'_blank');
    });
    modalEpisodes.appendChild(div);
  });
}

function closeModal(){modalBack.style.display='none'; modalBack.setAttribute('aria-hidden','true'); modalSeasons.innerHTML=''; modalEpisodes.innerHTML='';}
modalClose.addEventListener('click', closeModal);
modalBack.addEventListener('click', e=>{if(e.target===modalBack)closeModal();});
document.addEventListener('keydown', e=>{if(e.key==='Escape' && modalBack.style.display==='flex')closeModal();});
